<style>
:root {
  --primary:#6768AB;--primary-light:#7E7FBD;--primary-pale:#EBEBF5;
  --accent:#7550A0;--dark:#27283D;--dark-soft:#3A3B55;
  --white:#FFF;--off-white:#F7F7FB;--gray-50:#FAFAFC;
  --gray-100:#F0F0F5;--gray-200:#E2E2EA;--gray-300:#C8C8D4;
  --gray-400:#9696A8;--gray-500:#6E6E82;--gray-600:#4A4A5E;
  --green:#3B9B6D;--red:#C94F4F;--red-light:#FCEAEA;
  --font:'Nunito Sans',sans-serif;--font-h:'Raleway',sans-serif;
  --radius:10px;--shadow:0 1px 3px rgba(39,40,61,0.04);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);color:var(--dark);background:var(--gray-100);-webkit-font-smoothing:antialiased}

/* ═══ HEADER ═══ */
.hdr{background:var(--dark);color:var(--white);padding:0 1.75rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.hdr-brand{display:flex;align-items:center;gap:.75rem}
.hdr-brand h1{font-family:var(--font-h);font-size:.9rem;font-weight:600;letter-spacing:.8px}
.hdr-brand h1 span{color:var(--primary-light)}
.hdr-badge{font-size:.6rem;font-weight:700;background:var(--dark-soft);color:var(--gray-400);padding:.2rem .55rem;border-radius:4px;letter-spacing:.8px;text-transform:uppercase}
.hdr-actions{display:flex;gap:.5rem;align-items:center}

/* ═══ LAYOUT ═══ */
.body{display:flex;min-height:calc(100vh - 54px)}

/* ═══ SIDEBAR ═══ */
.side{width:232px;background:var(--white);border-right:1px solid var(--gray-200);flex-shrink:0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;padding-bottom:2rem}
.side::-webkit-scrollbar{width:4px}
.side::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:4px}
.sg{padding-top:1rem}
.sg:first-child{padding-top:.75rem}
.sg-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1.8px;color:var(--gray-400);padding:.4rem 1.25rem .5rem;user-select:none}
.sl{display:block;padding:.5rem 1.25rem;font-size:.82rem;color:var(--gray-500);cursor:pointer;border-left:3px solid transparent;transition:all .15s;user-select:none}
.sl:hover{background:var(--gray-50);color:var(--dark)}
.sl.active{background:var(--primary-pale);color:var(--primary);border-left-color:var(--primary);font-weight:600}
.s-div{height:1px;background:var(--gray-100);margin:.5rem 1.25rem}

/* ═══ MAIN ═══ */
.main{flex:1;padding:1.75rem 2rem;max-width:860px;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.mhdr{margin-bottom:1.5rem}
.mt{font-family:var(--font-h);font-size:1.15rem;font-weight:600}
.ms{font-size:.8rem;color:var(--gray-400);margin-top:.15rem}

/* ═══ BUTTONS ═══ */
.btn{font-family:var(--font);font-size:.78rem;font-weight:600;padding:.5rem 1.1rem;border:none;border-radius:7px;cursor:pointer;transition:all .15s;letter-spacing:.2px;display:inline-flex;align-items:center;gap:.4rem}
.btn-p{background:var(--primary);color:var(--white)}.btn-p:hover{background:var(--accent)}
.btn-g{background:var(--green);color:var(--white)}.btn-g:hover{background:#338B5E}
.btn-h{background:var(--dark-soft);color:var(--gray-300);border:1px solid var(--gray-600)}.btn-h:hover{border-color:var(--primary-light);color:var(--white)}
.btn-o{background:transparent;border:1.5px solid var(--gray-200);color:var(--gray-500)}.btn-o:hover{border-color:var(--primary);color:var(--primary)}
.btn-add{font-family:var(--font);font-size:.75rem;color:var(--primary);background:none;border:1.5px dashed var(--gray-200);padding:.45rem .85rem;border-radius:7px;cursor:pointer;transition:all .15s;margin-top:.5rem;display:inline-flex;align-items:center;gap:.3rem}
.btn-add:hover{background:var(--primary-pale);border-color:var(--primary)}
.btn-del{width:26px;height:26px;border:none;background:transparent;color:var(--gray-300);border-radius:6px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-del:hover{background:var(--red-light);color:var(--red)}

/* ═══ CARDS ═══ */
.card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:1.5rem 1.75rem;margin-bottom:1.25rem;box-shadow:var(--shadow)}
.card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--gray-100)}
.card-t{font-family:var(--font-h);font-size:.95rem;font-weight:600}
.card-id{font-size:.65rem;color:var(--gray-400);background:var(--gray-100);padding:.2rem .5rem;border-radius:4px;font-weight:700;letter-spacing:.5px;font-family:monospace}

/* ═══ FIELDS ═══ */
.fg{margin-bottom:1.15rem}.fg:last-child{margin-bottom:0}
.fl{display:flex;align-items:center;gap:.4rem;font-size:.72rem;font-weight:600;color:var(--gray-500);margin-bottom:.35rem;letter-spacing:.2px}
.lang{font-size:.58rem;font-weight:700;padding:.12rem .35rem;border-radius:3px;letter-spacing:.6px;line-height:1}
.lang-en{background:#E3E8F8;color:#4A5B9C}
.lang-vn{background:#FDEADD;color:#9C654A}
.fi{width:100%;padding:.55rem .8rem;border:1.5px solid var(--gray-200);border-radius:7px;font-family:var(--font);font-size:.85rem;color:var(--dark);background:var(--white);transition:all .15s;outline:none}
.fi:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(103,104,171,.08)}
.fi::placeholder{color:var(--gray-300)}
textarea.fi{min-height:72px;resize:vertical;line-height:1.55}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}

/* ═══ LOGO ═══ */
.logo-area{display:flex;align-items:center;gap:1rem;padding:.85rem 1rem;background:var(--gray-50);border:1.5px dashed var(--gray-300);border-radius:var(--radius);cursor:pointer;transition:all .15s}
.logo-area:hover{border-color:var(--primary);background:var(--primary-pale)}
.logo-prev{width:110px;height:38px;background:var(--gray-200);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:.6rem;color:var(--gray-400);font-weight:700;letter-spacing:1px}
.logo-prev img{max-width:100%;max-height:100%;object-fit:contain}
.logo-txt{font-size:.78rem;color:var(--gray-500);line-height:1.4}
.logo-txt strong{display:block;color:var(--dark);font-size:.82rem;margin-bottom:.1rem}

/* ═══ LIST EDITOR ═══ */
.li-item{display:flex;gap:.4rem;align-items:center;margin-bottom:.4rem;padding:.2rem;border-radius:6px;transition:background .15s}
.li-item.dragging{opacity:.4;background:var(--primary-pale)}
.li-item.drag-over{border-top:2px solid var(--primary);margin-top:-2px}
.li-num{font-size:.65rem;font-weight:700;color:var(--gray-400);width:18px;text-align:center;flex-shrink:0}
.li-drag{cursor:grab;color:var(--gray-300);font-size:.9rem;flex-shrink:0;padding:0 .15rem;user-select:none}
.li-drag:active{cursor:grabbing}
.li-item input{flex:1;padding:.45rem .7rem;font-size:.82rem}

/* ═══ DRAGGABLE CARD ═══ */
.drag-card{position:relative;padding:.15rem 0}
.drag-card.dragging{opacity:.4}
.drag-card.drag-over-top{border-top:2px solid var(--primary)}
.drag-card.drag-over-bot{border-bottom:2px solid var(--primary)}
.drag-handle{position:absolute;left:-1.5rem;top:50%;transform:translateY(-50%);cursor:grab;color:var(--gray-300);font-size:.85rem;opacity:0;transition:opacity .15s;user-select:none}
.drag-handle:active{cursor:grabbing}
.card:hover .drag-handle{opacity:1}

/* ═══ GITHUB ═══ */
.gh-card{background:linear-gradient(135deg,var(--dark) 0%,var(--dark-soft) 100%);color:var(--white);padding:1.5rem 1.75rem;border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.gh-card h3{font-family:var(--font-h);font-size:.92rem;font-weight:600;margin-bottom:.35rem}
.gh-card .gh-d{font-size:.78rem;color:var(--gray-400);margin-bottom:1.25rem;line-height:1.5}
.gh-card label{font-size:.72rem;font-weight:600;color:var(--gray-300);display:block;margin-bottom:.25rem}
.gh-card input{width:100%;padding:.5rem .7rem;border:1.5px solid var(--gray-600);border-radius:7px;background:rgba(255,255,255,.05);color:var(--white);font-family:var(--font);font-size:.82rem;margin-bottom:.85rem;outline:none;transition:border-color .15s}
.gh-card input::placeholder{color:var(--gray-600)}
.gh-card input:focus{border-color:var(--primary-light);background:rgba(255,255,255,.08)}
.gh-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.gh-actions{display:flex;gap:.75rem;align-items:flex-end;margin-top:.25rem}
.gh-actions .btn{flex:1;justify-content:center}

/* ═══ SUB DIVIDERS ═══ */
.sub-d{border-top:1px solid var(--gray-100);padding-top:1rem;margin-top:.75rem;margin-bottom:.5rem}
.sub-l{font-size:.72rem;font-weight:700;color:var(--primary);letter-spacing:.3px;margin-bottom:.6rem;display:flex;align-items:center;gap:.35rem}
.sub-n{background:var(--primary-pale);color:var(--primary);font-size:.6rem;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.7rem 1.2rem;border-radius:8px;font-size:.82rem;font-weight:600;transform:translateY(80px);opacity:0;transition:all .25s;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.12);display:flex;align-items:center;gap:.5rem}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--green);color:var(--white)}
.toast.error{background:var(--red);color:var(--white)}

/* ═══ INFO ═══ */
.info{background:var(--primary-pale);border:1px solid rgba(103,104,171,.15);border-radius:8px;padding:.75rem 1rem;font-size:.76rem;color:var(--gray-600);line-height:1.5;margin-bottom:1.15rem}
.info strong{color:var(--primary)}

/* ═══ UNDO BAR ═══ */
.undo-bar{display:flex;gap:.35rem;align-items:center}
.undo-bar button{background:var(--dark-soft);border:1px solid var(--gray-600);color:var(--gray-400);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.undo-bar button:hover:not(:disabled){color:var(--white);border-color:var(--primary-light)}
.undo-bar button:disabled{opacity:.3;cursor:default}
</style>
</head>

function h(tag,a,ch){var e=document.createElement(tag);if(a)Object.keys(a).forEach(function(k){if(k==='className')e.className=a[k];else if(typeof a[k]==='function')e.addEventListener(k.replace(/^on/,''),a[k]);else e.setAttribute(k,a[k]);});if(typeof ch==='string')e.innerHTML=ch;else if(Array.isArray(ch))ch.forEach(function(c){if(c)e.appendChild(c);});return e;}
function pair(lbl,kE,kV,vE,vV,ta){var t=ta?'textarea':'input',g=h('div',{className:'fg'});g.appendChild(h('div',{className:'fr'},[h('div',null,[h('div',{className:'fl'},'<span class="lang lang-en">EN</span> '+lbl),h(t,Object.assign({className:'fi','data-key':kE,onchange:snap},ta?{}:{value:vE||''}),ta?(vE||''):undefined)]),h('div',null,[h('div',{className:'fl'},'<span class="lang lang-vn">VN</span> '+lbl),h(t,Object.assign({className:'fi','data-key':kV,onchange:snap},ta?{}:{value:vV||''}),ta?(vV||''):undefined)])]));return g;}
function single(lbl,key,val,ta){var t=ta?'textarea':'input',g=h('div',{className:'fg'});g.appendChild(h('div',{className:'fl'},lbl));g.appendChild(h(t,Object.assign({className:'fi','data-key':key,onchange:snap},ta?{}:{value:val||''}),ta?(val||''):undefined));return g;}
function card(id,title,children){var c=h('div',{className:'card',id:'sec-'+id});c.appendChild(h('div',{className:'card-hdr'},[h('div',{className:'card-t'},title),h('span',{className:'card-id'},id)]));if(Array.isArray(children))children.forEach(function(ch){if(ch)c.appendChild(ch);});return c;}
function subLabel(num,text){return h('div',{className:'sub-d'},[h('div',{className:'sub-l'},(num?'<span class="sub-n">'+num+'</span> ':'')+text)]);}

// ═══ LIST EDITOR with drag ═══
function listCol(lang,key,arr){
  var col=h('div');
  col.appendChild(h('div',{className:'fl'},'<span class="lang lang-'+lang.toLowerCase()+'">'+lang+'</span> Detail items'));
  var list=h('div',{className:'list-editor','data-list-key':key});
  (arr||[]).forEach(function(item,i){list.appendChild(mkLI(i,item));});
  enableDragList(list);
  col.appendChild(list);
  col.appendChild(h('button',{className:'btn-add',onclick:function(){var n=list.querySelectorAll('.li-item').length;list.appendChild(mkLI(n,''));enableDragList(list);snap();}},'\u002b Add item'));
  return col;
}
function mkLI(i,val){
  return h('div',{className:'li-item',draggable:'true'},[
    h('span',{className:'li-drag'},'\u2261'),
    h('span',{className:'li-num'},String(i+1)),
    h('input',{className:'fi',value:val,onchange:snap}),
    h('button',{className:'btn-del',onclick:function(){this.closest('.li-item').remove();renum(this.closest('.list-editor'));snap();}},'\u00d7')
  ]);
}
function renum(list){if(!list)return;list.querySelectorAll('.li-num').forEach(function(n,i){n.textContent=i+1;});}
function enableDragList(list){
  var dragEl=null;
  list.addEventListener('dragstart',function(e){var li=e.target.closest('.li-item');if(li){dragEl=li;li.classList.add('dragging');}});
  list.addEventListener('dragend',function(){if(dragEl)dragEl.classList.remove('dragging');list.querySelectorAll('.li-item').forEach(function(l){l.classList.remove('drag-over');});dragEl=null;renum(list);snap();});
  list.addEventListener('dragover',function(e){e.preventDefault();var li=e.target.closest('.li-item');if(li&&li!==dragEl){li.classList.add('drag-over');}});
  list.addEventListener('dragleave',function(e){var li=e.target.closest('.li-item');if(li)li.classList.remove('drag-over');});
  list.addEventListener('drop',function(e){e.preventDefault();var li=e.target.closest('.li-item');if(li&&dragEl&&li!==dragEl){list.insertBefore(dragEl,li);}list.querySelectorAll('.li-item').forEach(function(l){l.classList.remove('drag-over');});});
}
function listEdit(kE,kV,aE,aV){var g=h('div',{className:'fg'});g.appendChild(h('div',{className:'fr'},[listCol('EN',kE,aE),listCol('VN',kV,aV)]));return g;}

sections.hero=function(){return[card('1.1','Hero Section',[pair('Label','hero.label_en','hero.label_vi',data.hero.label_en,data.hero.label_vi),pair('Title','hero.title_en','hero.title_vi',data.hero.title_en,data.hero.title_vi),h('div',{className:'info'},'HTML tags allowed: <strong>&lt;em&gt;</strong> for italic emphasis.'),pair('Description','hero.desc_en','hero.desc_vi',data.hero.desc_en,data.hero.desc_vi,true),pair('CTA Button','hero.cta_en','hero.cta_vi',data.hero.cta_en,data.hero.cta_vi)])];};

sections['svc-h']=function(){return[card('2.0','Services Section Header',[pair('Section Label','services.label_en','services.label_vi',data.services.label_en,data.services.label_vi),pair('Section Title','services.title_en','services.title_vi',data.services.title_en,data.services.title_vi)])];};

sections.form=function(){return[card('3.2','Contact Form',[pair('Form Title','contact.form.title_en','contact.form.title_vi',data.contact.form.title_en,data.contact.form.title_vi),pair('Form Desc','contact.form.desc_en','contact.form.desc_vi',data.contact.form.desc_en,data.contact.form.desc_vi,true),pair('Submit Button','contact.form.submit_en','contact.form.submit_vi',data.contact.form.submit_en,data.contact.form.submit_vi),single('Mailto','contact.form.mailto',data.contact.form.mailto)])];};

// ═══ SECTION SWITCHING ═══
var curSec='github';
function showSection(key,noSnap){
  if(!noSnap)collectInputs();
  curSec=key;
  document.querySelectorAll('.sl').forEach(function(l){l.classList.toggle('active',l.getAttribute('data-s')===key);});
  var main=document.getElementById('adminMain');
  main.style.animation='none';main.offsetHeight;main.style.animation='';
  main.innerHTML='';
  var m=meta[key]||{t:'',d:''};
  main.appendChild(h('div',{className:'mhdr'},[h('div',null,[h('div',{className:'mt'},m.t),h('div',{className:'ms'},m.d)])]));
  (sections[key]?sections[key]():[]).forEach(function(e){main.appendChild(e);});
}
window.showSection=showSection;
document.getElementById('sidebar').addEventListener('click',function(e){var l=e.target.closest('.sl');if(l&&l.dataset.s)showSection(l.dataset.s);});

// ═══ DATA COLLECTION ═══
function setN(o,p,v){var k=p.split('.'),c=o;for(var i=0;i<k.length-1;i++)c=c[isNaN(k[i])?k[i]:+k[i]];c[isNaN(k[k.length-1])?k[k.length-1]:+k[k.length-1]]=v;}
function collectInputs(){
  document.querySelectorAll('.fi[data-key]').forEach(function(inp){setN(data,inp.getAttribute('data-key'),inp.value);});
  document.querySelectorAll('.list-editor').forEach(function(list){var items=[];list.querySelectorAll('.li-item input').forEach(function(inp){items.push(inp.value);});setN(data,list.getAttribute('data-list-key'),items);});
  var o=document.getElementById('gh-owner');if(o){ghCfg={owner:o.value,repo:document.getElementById('gh-repo').value,token:document.getElementById('gh-token').value,branch:document.getElementById('gh-branch').value};try{localStorage.setItem('kaleido-gh',JSON.stringify(ghCfg));}catch(e){}}
}

// ═══ LOGO ═══
window.handleLogoUpload=function(input,type){var file=input.files[0];if(!file)return;var r=new FileReader();r.onload=function(e){data.site['logo_'+type]=e.target.result;document.getElementById(type==='nav'?'lnP':'lfP').innerHTML='<img src="'+e.target.result+'">';snap();};r.readAsDataURL(file);};

// ═══ EXPORT ═══
window.exportJSON=function(){collectInputs();var b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='content.json';a.click();toast('JSON exported','success');};

// ═══ PREVIEW ═══
window.openPreview=function(){collectInputs();var w=window.open('index.html','kaleido-preview');if(w){setTimeout(function(){try{if(w.KaleidoCMS){w.KaleidoCMS.setData(data);toast('Preview updated','success');}else{toast('Preview opened \u2014 content engine not found','error');}}catch(e){toast('Preview opened in new tab','success');}},1500);}else{toast('Allow popups for preview','error');}};

// ═══ GITHUB ═══
window.saveToGitHub=function(){
  collectInputs();snap();
  if(!ghCfg.owner||!ghCfg.repo||!ghCfg.token){toast('Configure GitHub first','error');return;}
  var btn=document.getElementById('btnSave');btn.innerHTML='&#8987; Saving...';btn.disabled=true;
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  var url='https://api.github.com/repos/'+ghCfg.owner+'/'+ghCfg.repo+'/contents/content.json';
  fetch(url,{headers:{'Authorization':'token '+ghCfg.token}}).then(function(r){return r.ok?r.json():null;}).then(function(ex){
    var body={message:'Update content via KALEIDO CMS',content:content,branch:ghCfg.branch};if(ex&&ex.sha)body.sha=ex.sha;
    return fetch(url,{method:'PUT',headers:{'Authorization':'token '+ghCfg.token,'Content-Type':'application/json'},body:JSON.stringify(body)});
  }).then(function(r){btn.innerHTML='&#10003; Save &amp; Deploy';btn.disabled=false;toast(r.ok?'Saved! Vercel auto-deploys.':'Failed \u2014 check config.',r.ok?'success':'error');
  }).catch(function(){btn.innerHTML='&#10003; Save &amp; Deploy';btn.disabled=false;toast('Network error','error');});
};
window.testGitHub=function(){
  collectInputs();if(!ghCfg.owner||!ghCfg.repo||!ghCfg.token){toast('Fill all fields','error');return;}
  fetch('https://api.github.com/repos/'+ghCfg.owner+'/'+ghCfg.repo,{headers:{'Authorization':'token '+ghCfg.token}}).then(function(r){return r.json();}).then(function(d){toast(d.full_name?'Connected: '+d.full_name:'Not found',d.full_name?'success':'error');}).catch(function(){toast('Connection failed','error');});
};

// ═══ TOAST ═══
function toast(msg,type){var t=document.getElementById('toast');t.innerHTML=(type==='success'?'&#10003; ':'&#9888; ')+msg;t.className='toast '+type+' show';setTimeout(function(){t.classList.remove('show');},3000);}

// ═══ KEYBOARD SHORTCUTS ═══
document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveToGitHub();}
});

// ═══ BOOT ═══
showSection('github');
})();
</script>
